services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      OPS_PULSE_DEMO_MODE: ${OPS_PULSE_DEMO_MODE:-false}
      OPS_PULSE_DISK_PATH: /hostfs
      OPS_PULSE_SAMPLE_INTERVAL_SECONDS: 3
    network_mode: host
    pid: host
    volumes:
      - /:/hostfs:ro
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      - agent
    environment:
      OPS_PULSE_AGENT_BASE_URL: http://host.docker.internal:8080
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "8090:8090"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - agent
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "1090:9090"
    restart: unless-stopped
    volumes:
      - ./stack/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./stack/rules.yml:/etc/prometheus/rules.yml:ro

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3010:3000"
    restart: unless-stopped
    volumes:
      - ./stack/provisioning:/etc/grafana/provisioning:ro
