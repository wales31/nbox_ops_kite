groups:
  - name: ops-pulse
    rules:
      - alert: HostCpuHigh
        expr: device_cpu_percent > 85
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: CPU usage has been above 85% for at least one minute

      - alert: HostMemoryHigh
        expr: device_memory_percent > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Memory usage has been above 80% for at least two minutes

      - alert: HostDiskHigh
        expr: device_disk_percent > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Disk usage has been above 90% for at least five minutes

